<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeleSaver — Choose Experience</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
      color: #0f172a;
      text-align: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 440px);
      background: white;
      border-radius: 28px;
      box-shadow: 0 28px 70px rgba(15, 23, 42, 0.12);
      padding: 32px 24px;
    }
    img {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 1.45rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 24px;
      color: #475569;
      line-height: 1.7;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: inline-flex;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: #2563eb;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .links a.secondary {
      background: #0f172a;
    }
    .links a:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/telesaver.png" alt="TeleSaver logo" />
    <h1>TeleSaver is loading the best version for your device.</h1>
    <p>If redirection does not happen automatically, choose your preferred experience below.</p>
    <div class="links">
      <a href="/desktop/index.html">Desktop version</a>
      <a href="/mobile/index.html" class="secondary">Mobile version</a>
    </div>
  </div>
  <script>
    (function() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isMobile = typeof navigator.userAgentData === 'object'
        ? navigator.userAgentData.mobile
        : /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);

      const target = isMobile ? '/mobile/index.html' : '/desktop/index.html';
      window.location.replace(target);
    })();
  </script>
</body>
</html>
