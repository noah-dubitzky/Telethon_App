<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Filters</title>
    <link rel="stylesheet" href="sheets/style.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #fafafa; }
        header { margin-bottom: 24px; }
        h1 { margin-bottom: 8px; }
        section { margin-bottom: 28px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px 10px; border: 1px solid #e0e0e0; text-align: left; }
        th { background: #f5f7fa; }
        .status-pill { display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 999px; font-size: 0.90rem; }
        .status-allow { background: #d1fae5; color: #166534; }
        .status-deny { background: #fee2e2; color: #991b1b; }
        
        /* Toggle Switch Styles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #22c55e;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <header>
        <h1>Filter settings</h1>
        <p>List all channels and senders. Toggle whether messages from each sender are allowed or denied.</p>
    </header>

    <section>
        <h2>Channels</h2>
        <div class="table-container">
            <table id="channels-table">
                <thead>
                    <tr><th>Name</th><th>Status</th><th>Allow</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <section>
        <h2>Senders</h2>
        <div class="table-container">
            <table id="senders-table">
                <thead>
                    <tr><th>Sender</th><th>Channel</th><th>Status</th><th>Allow</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <script src="scripts/filters.js"></script>
</body>
</html>
