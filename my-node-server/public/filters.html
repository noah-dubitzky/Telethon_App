<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Filters</title>
    <link rel="stylesheet" href="sheets/style.css" />
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --panel-border: #dfe3ea;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --success: #16a34a;
            --danger: #b22727;
            --surface: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            overflow-y: scroll;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-y: auto;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
            padding: 32px;
        }

        header {
            margin-bottom: 28px;
            max-width: 1040px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(37, 99, 235, 0.16);
            background: rgba(37, 99, 235, 0.08);
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .back-button:hover {
            background: rgba(37, 99, 235, 0.14);
            transform: translateY(-1px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 2.5vw, 2.5rem);
            letter-spacing: -0.03em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            max-width: 760px;
        }

        section {
            margin-bottom: 28px;
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.9);
            padding: 26px;
        }

        section h2 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 1.15rem;
            color: #111827;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        th, td {
            padding: 16px 18px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #f8fafc;
            color: #374151;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--panel-border);
        }

        tbody tr {
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
            transition: background-color 0.2s ease;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(37, 99, 235, 0.04);
        }

        td {
            color: #334155;
            font-size: 0.95rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 0.88rem;
            letter-spacing: 0.01em;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-allow {
            background: rgba(34, 197, 94, 0.14);
            color: var(--success);
        }

        .status-deny {
            background: rgba(178, 39, 39, 0.12);
            color: var(--danger);
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 54px;
            height: 30px;
            border-radius: 999px;
            background: #d1d5db;
            transition: background-color 0.3s ease;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 3px;
            background-color: #ffffff;
            border-radius: 999px;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.12);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 0;
            top: 0;
            border-radius: 50%;
            background-color: #ffffff;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
            transition: transform 0.3s ease;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        @media (max-width: 780px) {
            body {
                padding: 20px;
            }
            section {
                padding: 20px;
            }
            th, td {
                padding: 14px 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a class="back-button" href="index.html">← Back to dashboard</a>
        <h1>Filter settings</h1>
        <p>List all channels and senders. Toggle whether messages from each sender are allowed or denied.</p>
    </header>

    <section>
        <h2>Channels</h2>
        <div class="table-container">
            <table id="channels-table">
                <thead>
                    <tr><th>Name</th><th>Status</th><th>Allow</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <section>
        <h2>Senders</h2>
        <div class="table-container">
            <table id="senders-table">
                <thead>
                    <tr><th>Sender</th><th>Channel</th><th>Status</th><th>Allow</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <script src="scripts/filters.js"></script>
</body>
</html>
