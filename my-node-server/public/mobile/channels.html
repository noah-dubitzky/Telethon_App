<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel Messages — Mobile</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #0f172a;
      --muted: #475569;
      --accent: #1d4ed8;
      --bubble: #e2e8f0;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
    }

    .button {
      background: var(--accent);
      color: white;
    }

    .back-link {
      color: var(--accent);
      background: rgba(29, 78, 216, 0.1);
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.06);
    }

    .meta-card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .meta-card p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .messages {
      display: grid;
      gap: 12px;
    }

    .message {
      background: var(--bubble);
      border-radius: 22px;
      padding: 14px;
      word-break: break-word;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    .message .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .placeholder {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Channel messages</h1>
      <p>Mobile-friendly channel conversation viewer.</p>
    </div>
    <div class="button-group">
      <a href="index.html" class="back-link">← Back</a>
      <a href="filters.html" class="button">Filters</a>
    </div>
  </div>

  <section class="meta-card">
    <h2 id="channel-name">Loading channel…</h2>
    <p>Channel ID: <span id="channel-id">—</span></p>
  </section>

  <section id="messages" class="messages">
    <div class="placeholder">Loading messages…</div>
  </section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../scripts/messages_api.js"></script>
  <script src="../scripts/message_handling_helpers.js"></script>
  <script>
    const socket = io();

    function formatMessage(msg) {
      const sentAt = msg.timestamp ? Helpers.convertToNormalTime(msg.timestamp) : 'Unknown time';
      return `
        <article class="message">
          <div>${msg.text || ''}</div>
          ${msg.media_path ? `<div class="meta"><a href="${Helpers.cleanMediaPath(msg.media_path)}" target="_blank">View attachment</a></div>` : ''}
          <div class="meta">
            <span>${sentAt}</span>
            <span>${msg.sender_name || msg.sender || ''}</span>
          </div>
        </article>`;
    }

    function appendMessage(msg) {
      $('#messages').append(formatMessage(msg));
    }

    socket.on('updateMessage', function (data) {
      const channelId = Helpers.getQueryParam('id');
      if (channelId && String(data.channel_id || data.channelId) === String(channelId)) {
        appendMessage(data);
      }
    });

    $(function () {
      const channelId = Helpers.getQueryParam('id');
      const channelName = Helpers.getQueryParam('name');
      const api = new MessagesAPI();

      if (!channelId) {
        $('#messages').html('<div class="placeholder">Missing channel ID.</div>');
        return;
      }

      $('#channel-id').text(channelId);
      $('#channel-name').text(channelName || 'Channel');

      api.getMessagesByChannel(channelId)
        .done(function (rows) {
          const container = $('#messages');
          container.empty();
          if (!rows || rows.length === 0) {
            container.html('<div class="placeholder">No messages found for this channel.</div>');
            return;
          }

          const currentName = (rows[0].channel_name || rows[0].channel || channelName);
          $('#channel-name').text(currentName);
          rows.forEach(appendMessage);
        })
        .fail(function () {
          $('#messages').html('<div class="placeholder">Unable to load messages.</div>');
        });
    });
  </script>
</body>
</html>
