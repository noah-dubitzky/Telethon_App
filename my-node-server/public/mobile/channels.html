<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel Messages — Mobile</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #d1d5db;
      --text: #0f172a;
      --muted: #475569;
      --accent: #1d4ed8;
      --bubble: #e2e8f0;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      width: 100vw;
      max-width: 100vw;
      background: linear-gradient(90deg, #3b82f6 0%, #a78bfa 100%);
      color: #fff;
      padding: 18px 18px 12px 18px;
      box-shadow: 0 2px 12px rgba(55,65,81,0.07);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #fff;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.15s, color 0.15s;
      min-width: 44px;
      min-height: 44px;
    }

    .button {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(29,78,216,0.08);
    }

    .back-link {
      color: #fff;
      background: rgba(29, 78, 216, 0.18);
      border: 1px solid #fff;
    }
    .back-link:active, .back-link:focus {
      background: #fff;
      color: var(--accent);
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
      margin-left: -8px;
      margin-right: -8px;
    }

    .meta-card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .meta-card p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
      padding-bottom: 24px;
      height: 60vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #a5b4fc #e5e7eb;
      background: #f3f4f6;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(55,65,81,0.08);
    }
    .messages::-webkit-scrollbar {
      width: 8px;
      background: #e5e7eb;
      border-radius: 8px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: #a5b4fc;
      border-radius: 8px;
    }

    .messages > article {
      background: linear-gradient(135deg, #a5b4fc 0%, #f3e8ff 100%);
      border-radius: 12px 12px 12px 4px;
      padding: 18px 16px 14px 18px;
      word-break: break-word;
      box-shadow: 0 6px 18px rgba(55,65,81,0.10);
      font-size: 1.08rem;
      margin: 8px 14px 8px 14px;
      border: 1.5px solid #c7d2fe;
      position: relative;
      transition: box-shadow 0.15s;
    }
    .messages > article:active, .messages > article:focus {
      box-shadow: 0 8px 24px rgba(99,102,241,0.18);
    }

    .messages > article .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Timestamp style */
    .messages > div {
      background: #ede9fe;
      color: #7c3aed;
      font-size: 0.82rem;
      padding: 3px 10px 3px 8px;
      border-radius: 12px 12px 12px 4px;
      font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 8px rgba(124,58,237,0.07);
      margin-top: 6px;
      margin-left: 8px;
      margin-right: auto;
      display: inline-block;
      border: 1px solid #c4b5fd;
    }

    .placeholder {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      margin: 12px 8px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Channel messages</h1>
    </div>
    <div class="button-group">
      <a href="/mobile/index.html" class="back-link">← Back</a>
    </div>
  </div>

  <section class="meta-card">
    <h2 id="channel-name">Loading channel…</h2>
  </section>

  <section id="messages" class="messages">
    <div class="placeholder">Loading messages…</div>
  </section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/scripts/messages_api.js"></script>
  <script src="/scripts/message_handling_helpers.js"></script>
  <script>

    latest_sent_date = "00-00-0000";

    const socket = io();

    socket.on('updateMessage', (data) => {
      data.sent_at = data.timestamp;
      if(data.sender_id == Helpers.getQueryParam("external_id")) {
        window.alert("Message Added");
        updateNewMessages(data);
        scrollMessagesToBottom();
      }
    });

    // --- page logic ---
    $(async function(){
      const channelId = Helpers.getQueryParam("id");
      const channelName = Helpers.getQueryParam("name");

      const api = new MessagesAPI(); // our global API helper

      if(!channelId){
        $("#messages").html(`<div class="p-6 text-red-500">Missing sender id.</div>`);
        return;
      }

      $("#channel-name").text(channelName || "—");

      try {
        const rows = await api.getMessagesByChannel(channelId);
        const channelName = (rows && rows[0] && (rows[0].channel_name || rows[0].channel)) || "";
        $("#channel-name").text(channelName);

        const box = $("#messages");
        box.empty();
        if(!rows || rows.length === 0){
          box.html(`<div class="p-6 text-gray-500">No messages found for this channel.</div>`);
          return;
        }

        rows.forEach(m => box.append(renderMessage(m)));
        scrollMessagesToBottom();
      } catch (err) {
        $("#messages").html(`<div class="p-6 text-red-500">Failed to load messages.</div>`);
        console.error(err);
      }

    });
    
  </script>
</body>
</html>
