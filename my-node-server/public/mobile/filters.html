<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filters</title>
    <style>
        :root {
            --bg: #f2f6fb;
            --surface: #ffffff;
            --border: #d9e2ef;
            --text: #102a43;
            --muted: #627d98;
            --accent: #1d4ed8;
            --success: #047857;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .topbar h1 {
            font-size: 1.25rem;
            margin: 0;
            line-height: 1.2;
        }

        .back-button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent);
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 600;
            white-space: nowrap;
        }

        .intro {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.6;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(16, 42, 67, 0.08);
            padding: 18px;
            margin-bottom: 18px;
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 1.05rem;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border: 0;
        }

        th {
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding-bottom: 8px;
        }

        tbody tr {
            background: #f8fbff;
            border-radius: 14px;
        }

        td {
            font-size: 0.95rem;
            color: var(--text);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-allow {
            background: rgba(16, 185, 129, 0.12);
            color: var(--success);
        }

        .status-deny {
            background: rgba(185, 28, 28, 0.12);
            color: var(--danger);
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 44px;
            height: 24px;
            background: #d1d5db;
            border-radius: 999px;
            padding: 3px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 3px;
            background: #ffffff;
            border-radius: 999px;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 2px 8px rgba(16, 42, 67, 0.12);
        }

        .toggle-switch input:checked + .slider {
            background: var(--accent);
            transform: translateX(20px);
        }

        .mobile-note {
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 14px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .card {
                padding: 16px;
            }

            th, td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>
            <h1>Filter settings</h1>
            <p class="intro">Toggle channel and sender filters from your phone without losing layout or usability.</p>
        </div>
        <a class="back-button" href="index.html">Back</a>
    </div>

    <section class="card">
        <h2>Channels</h2>
        <div class="table-container">
            <table id="channels-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Allow</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <p class="mobile-note">Swipe left on the table if content is wider than the screen.</p>
    </section>

    <section class="card">
        <h2>Senders</h2>
        <div class="table-container">
            <table id="senders-table">
                <thead>
                    <tr>
                        <th>Sender</th>
                        <th>Status</th>
                        <th>Allow</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <p class="mobile-note">Tap on the toggle to allow or deny a sender instantly.</p>
    </section>

    <script src="../scripts/filters.js"></script>
</body>
</html>
