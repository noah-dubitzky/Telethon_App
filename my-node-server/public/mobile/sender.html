<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sender Messages — Mobile</title>
  <style>
    :root {
      --bg: #eef2ff;
      --card: #ffffff;
      --border: #d8dee9;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --bubble-in: #e0f2fe;
      --bubble-out: #c7d2fe;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .topbar h1 {
      font-size: 1rem;
      margin: 0;
      line-height: 1.3;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
    }

    .meta-card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .meta-card p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .messages {
      display: grid;
      gap: 12px;
    }

    .message {
      background: var(--bubble-in);
      border-radius: 22px;
      padding: 14px;
      word-break: break-word;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    .message .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .placeholder {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Sender messages</h1>
      <p>Mobile-friendly view for sender conversations.</p>
    </div>
    <div class="button-group">
      <a href="index.html" class="back-link">← Back</a>
      <a href="filters.html" class="button">Filters</a>
    </div>
  </div>

  <section class="meta-card">
    <h2 id="sender-name">Loading sender…</h2>
    <p>Phone: <span id="sender-phone">—</span></p>
    <p>External ID: <span id="sender-id">—</span></p>
  </section>

  <section id="messages" class="messages">
    <div class="placeholder">Loading messages…</div>
  </section>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../scripts/messages_api.js"></script>
  <script src="../scripts/message_handling_helpers.js"></script>
  <script>
    const socket = io();
    let latestSentDate = "0000-00-00";

    function formatMessage(msg) {
      const sentAt = msg.timestamp ? Helpers.convertToNormalTime(msg.timestamp) : 'Unknown time';
      return `
        <article class="message">
          <div>${msg.text || ''}</div>
          ${msg.media_path ? `<div class="meta"><a href="${Helpers.cleanMediaPath(msg.media_path)}" target="_blank">View attachment</a></div>` : ''}
          <div class="meta">
            <span>${sentAt}</span>
            <span>${msg.sender_name || ''}</span>
          </div>
        </article>`;
    }

    function appendMessage(msg) {
      const container = $('#messages');
      container.append(formatMessage(msg));
    }

    socket.on('updateMessage', function (data) {
      const external = Helpers.getQueryParam('external_id');
      if (external && data.external_sender_id === external) {
        appendMessage(data);
      }
    });

    $(function () {
      const senderId = Helpers.getQueryParam('id');
      const senderPhone = Helpers.getQueryParam('phone');
      const externalId = Helpers.getQueryParam('external_id');
      const api = new MessagesAPI();

      if (!senderId) {
        $('#messages').html('<div class="placeholder">Missing sender ID.</div>');
        return;
      }

      $('#sender-phone').text(senderPhone || '—');
      $('#sender-id').text(externalId || '—');

      api.getMessagesBySender(senderId)
        .done(function (rows) {
          const container = $('#messages');
          container.empty();
          if (!rows || rows.length === 0) {
            container.html('<div class="placeholder">No messages found for this sender.</div>');
            return;
          }

          const senderName = rows[0].sender_name || rows[0].sender || 'Unknown sender';
          $('#sender-name').text(senderName);
          rows.forEach(appendMessage);
        })
        .fail(function () {
          $('#messages').html('<div class="placeholder">Unable to load messages.</div>');
        });
    });
  </script>
</body>
</html>
