<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="scripts/desktop_sidebar.js"></script>
  <script src="../scripts/socket_load_messages.js"></script>

</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="bg-blue-600 text-white py-4 px-6 shadow-md
               grid grid-cols-[1fr_auto_1fr] items-center">

  <!-- Left spacer (balances right button) -->
  <div></div>

  <!-- Center group: logo + title -->
  <div class="flex items-center space-x-3 justify-self-center">
    <img
      src="/assets/telesaver.png"
      alt="App Logo"
      class="h-10 w-10 rounded-full shadow-md"
    />
    <h1 class="text-xl font-bold whitespace-nowrap">
      Telesaver Dashboard
    </h1>
  </div>

  <!-- Right sidebar button -->
  <button id="openSidebar" class="justify-self-end">
    <img
      src="/assets/SideBar.png"
      alt="Open Sidebar"
      class="h-9 w-9 shadow-md cursor-pointer
             hover:scale-105 transition-transform"
    />
  </button>

</header>

  <!-- User Info -->
  <section class="text-center mt-8">
    <h2 class="text-2xl font-semibold text-gray-800">Welcome, <span id="username" class="font-bold">Noah Dubitzky</span></h2>
  </section>

  <!-- Senders List -->
  <section class="max-w-2xl w-full mx-auto bg-white rounded-lg shadow-md mt-10 p-6">
    <h3 class="text-xl font-semibold text-gray-700 mb-4">Messages</h3>
    <div id="senders-container" class="divide-y divide-gray-200">
      <p class="text-gray-500">Loading senders...</p>
    </div>
  </section>

</body>
</html>
