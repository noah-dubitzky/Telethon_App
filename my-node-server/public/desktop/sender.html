<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telesaver — Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="../scripts/messages_api.js"></script>
  <script src="../socket.io/socket.io.js"></script>
  <script src="../scripts/message_handling_helpers.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../scripts/Export_As_PDF_Helpers.js"></script>
  <script src="scripts/desktop_sidebar.js"></script>

</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Top bar (centered logo + title, sticky, sidebar) -->
  <header class="bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 text-white py-4 px-6 flex items-center justify-center shadow-md sticky top-0 z-30">
    <div class="grid grid-cols-[1fr_auto_1fr] items-center w-full">
      <div></div>
      <div class="flex items-center justify-center space-x-3">
        <img src="/assets/telesaver.png" alt="App Logo" class="h-10 w-10 rounded-full shadow-md" />
        <h1 class="text-2xl font-bold text-center">Telesaver — Messages</h1>
      </div>
      <div class="flex justify-end">
        <button id="openSidebar">
          <img src="/assets/SideBar.png" alt="Open Sidebar" class="h-9 w-9 shadow-md cursor-pointer hover:scale-105 transition-transform" />
        </button>
      </div>
    </div>
  </header>

  <!-- Content wrapper -->
  <main class="max-w-4xl w-full mx-auto px-4 py-8">
    <div class="mb-6 flex items-center justify-between">
      <div class="bg-gradient-to-r from-blue-200 via-purple-100 to-pink-100 rounded-lg px-6 py-3 shadow flex items-center space-x-3">
        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8a9 9 0 100-18 9 9 0 000 18z"/></svg>
        <div>
          <h2 class="text-2xl font-bold text-gray-800 tracking-wide">
            Sender: <span id="sender-name" class="font-extrabold text-purple-700 drop-shadow">Loading...</span>
          </h2>
          <p class="text-gray-500 text-sm mt-1">
            Sender ID: <span id="sender-id">—</span>
          </p>
          <p class="text-gray-500 text-sm mt-1">
            Sender Phone: <span id="sender-phone">—</span>
          </p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <button id="download-messages" class="flex items-center bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded shadow transition">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 4v12"/></svg>
          Download
        </button>
        <a href="/" class="flex items-center bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded shadow transition border border-blue-600">← Back to senders</a>
      </div>
    </div>

    <!-- Messages list -->
    <section id="messages" class="bg-white pb-3 pt-1 rounded-lg shadow-md">
      <div class="p-6 text-gray-500">Loading messages…</div>
      <div class="p-6 text-gray-500">Loading messages…</div>
      <!-- Match message view styling -->
      <!-- Add flex-1, overflow-y-scroll, min-h-0, px-2, pt-2, max-height -->
    </section>

  </main>

  <script>

    latest_sent_date = "00-00-0000";

    const socket = io();

    socket.on('updateMessage', (data) => {

      data.sent_at = data.timestamp;

      if(data.sender_id == Helpers.getQueryParam("external_id")) {
        window.alert("Message Added");
        updateNewMessages(data);
      }

    });

    $('#download-messages').on('click', function() {

      exportChatAsPDF();

    });

    // --- page logic ---
    $(async function(){
      
      const senderId = Helpers.getQueryParam("id");
      const senderPhone = Helpers.getQueryParam("phone");
      const external_id = Helpers.getQueryParam("external_id");

      const api = new MessagesAPI(); // our global API helper

      if(!senderId){
        $("#messages").html(`<div class="p-6 text-red-500">Missing sender id.</div>`);
        return;
      }

      $("#sender-id").text(external_id);
      $("#sender-phone").text(senderPhone || "—");

      try {
        const rows = await api.getMessagesBySender(senderId);
        const senderName = (rows && rows[0] && (rows[0].sender_name || rows[0].sender)) || "";
        $("#sender-name").text(senderName);

        const box = $("#messages");
        box.empty();
        if(!rows || rows.length === 0){
          box.html(`<div class="p-6 text-gray-500">No messages found for this sender.</div>`);
          return;
        }

        rows.forEach(m => box.append(renderMessage(m)));
      } catch (err) {
        $("#messages").html(`<div class="p-6 text-red-500">Failed to load messages.</div>`);
        console.error(err);
      }
    });
  
  </script>
</body>
</html>
